
[global]
# environmental
_output_dir = "~/q8020"
_inject_outdir = "--outdir"
_env = "./.venv"
_script = "python ./q8020-mps-burgers/src/burgers_solver.py"
"--noshow" = true
# --- reference: FTCS as its OWN case (see [ftcs_ref]), run once ---
"--no-classical-reference" = true  # no per-method FTCS; [ftcs_ref] owns it
"--no-analytic-reference" = true   # moot under no-classical, kept explicit

# time
"--cfl" = 0.1                   # dt = cfl*dx; 1/cfl = 10 lattice-step cadence
# both ch and qlbm do incremental measure-reprepare, ch is variable, qlbm fixed
"--evolution-mode" = "measure_reprepare"  

# IC / BC
"--bc" = "periodic"             
"--ic" = "sine"                 
"--source" = "none"             # no forcing; just IC decay under viscosity

# simulator
"--seed" = 1234                 # make reproducible shots (all methods)

# Cap per-circuit metric transpile time, uncapped (0) can run long.
"--metric-transpile-timeout" = 0

# ***********************************************************************************
# variables for sweep

# 1) sine amplitude
# amplitude 0.3 → a gentle wave, fluid moving at most ±0.3.
# amplitude 0.8 → a tall, strong wave, fluid moving at most ±0.8.
# sweep: 0.3 / 0.5 / 0.8; higher unstable for CH at low bond dim
"--ic-amplitude" = 0.3 

# 2) viscosity; BKG relaxation time tau = 0.5 + nu*N; QLBM needs tau > 1 for stability
# sweep: [0.5, 0.1, 0.05, 0.03, 0.01]  
# CH broken below 0.015 and beyond - see issue #10
# QLBM finer grids allow smaller v
"--nu" = 0.05

# 3) shots: sweep to determine ideal
"--shots" = 150000              

# 4) qubits
# sweep: [4, 6, 7, 8, 9] & modify steps accordingly
"--q" = 6                       

# 5) steps
# example (amplitude=0.3, q=6, cfl=0.1):
# n_shock = 64 / (2π · 0.3 · 0.1) = 64 / 0.18850 ≈ 340
# round to be multiples of 10 for exact QLBM matching
#  - below (50%): 170
#  - at (100%):   340
#  - past (150%): 510
"--n-steps" = 100               


# ***********************************************************************************
[cole_hopf_circuit]
"--method" = "cole_hopf_circuit"
"--propagator" = "qft-diagonal"       # exact per step, shallowest, scales in q
"--bond-dim" = 4                      # converged for smooth phi; could sweep: [2, 4, 8]
# --- alignment cadence
# segment-size - divides QLBM's 10-step cadence so CH/FTCS snapshot at every QLBM 
# lattice time.  Also the measure_reprepare segment length (re-prep every 5 steps).
# Note QLBM k=1, i.e. steps are exact, whereas CH varies
"--segment-size" = 10
"--save-every" = 10
"--phi-modes" = 6

# ***********************************************************************************

[qlbm_circuit]
"--method" = "qlbm_circuit"
"--fock-qubits" = 3             # Fock qubits/density; qc=2 too coarse,3,4,...
                                # qc=3 -> dense 9-qubit collision/site
"--qalb-collision-trotter-reps" = 0  # vs 2, #27.1 Trotter synth (0=dense); err~1/reps^2

# ***********************************************************************************
# classical D1Q3 LBM: shares QLBM's scheme, so QLBM-vs-lbm isolates the
# quantum/Fock error and lbm-vs-FTCS isolates the scheme gap.
[lbm_classical]
"--method" = "lbm"

# ***********************************************************************************
[ftcs_ref]
"--method" = "ftcs_reference"        # owns the FTCS reference for the sweep
# use at least this many grid points on the classical reference; actual computed from q
"--ref-points" = 200                 # sweep: [200, 400, 800]
# snapshot at the same 10-step cadence as the anchor; without this FTCS
# defaults to save-every=0 -> only steps [0, n_steps] stored, so the
# reference curve resamples stale (frozen IC then final) at every frame.
"--save-every" = 10

# ***********************************************************************************
# postproc

_group_postproc = ["./.venv/bin/python ./q8020-mps-burgers/postproc/plot_method_compare.py --anchor qlbm_circuit --hide shift --no-ic"]

