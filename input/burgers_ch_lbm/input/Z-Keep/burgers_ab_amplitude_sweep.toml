
# =====================================================================
# A-B run 2 of 4 :  AMPLITUDE SWEEP  (the other way into CH's bad corner)
# ---------------------------------------------------------------------
# Question: amplitude enters CH's peakedness exponent the same way nu
# does -- phi ~ exp(A / 2*pi*nu) -- so raising A at fixed nu degrades CH
# while stressing QLBM's Fock truncation (high Mach) instead.
#
# At nu=0.03, q=8 the peakedness runs:
#   A=0.3 -> 4.9x  (CH excellent)
#   A=0.5 -> 14x   (CH starting to feel it)
#   A=0.8 -> 70x   (CH degrading)
# Meanwhile QLBM faces a stronger, more nonlinear wave: watch whether
# qc=3 still holds at A=0.8, and whether the ~0.11 scheme gap widens.
#
# n-steps held fixed across A: same physical time window + identical
# measure-reprepare cadence for both methods (a clean A-B), at the cost
# of capturing a different fraction of shock formation per amplitude.
#
# q=8 -> #27.1 required for QLBM; set --q = 6 for a today-dry-run.
# =====================================================================

[global]
_output_dir = "~/q8020"
_inject_outdir = "--outdir"
_env = "./.venv"
_script = "python ./q8020-mps-burgers/src/burgers_solver.py"
"--noshow" = true
"--no-classical-reference" = true
"--no-analytic-reference" = true

"--cfl" = 0.1
"--evolution-mode" = "measure_reprepare"

"--bc" = "periodic"
"--ic" = "sine"
"--source" = "none"
"--nu" = 0.03                         # fixed, comfortable for QLBM (tau=8.2)

"--seed" = 1234
"--shots" = 150000
"--metric-transpile-timeout" = 0

"--q" = 6                             # TODO = 8,9  (today-runnable dry-run at q=6)
"--n-steps" = 50                      # TODO = 200 (q=8) / 400 (q=9); n_steps ~ N

# Swept variable lives in each [group] (sweeper expands group lists only,
# then merges [global]; sweep.py:466-470).  Here:
#   --ic-amplitude = [0.3, 0.5, 0.8]  -> gentle/strong; peakedness 4.9/14/70x

# ---------------------------------------------------------------------
[cole_hopf_circuit]
"--method" = "cole_hopf_circuit"
"--propagator" = "qft-diagonal"
"--bond-dim" = 4                      # smooth-phi value; peaked phi may want 8
"--segment-size" = 5
"--save-every" = 5
"--ic-amplitude" = [0.3, 0.5, 0.8]
"--phi-modes" = 6

[qlbm_circuit]
"--method" = "qlbm_circuit"
"--fock-qubits" = 3
"--qalb-collision-trotter-reps" = 2  # #27.1 Trotter synth (0=dense); err~1/reps^2
"--ic-amplitude" = [0.3, 0.5, 0.8]

[lbm_classical]
"--method" = "lbm"
"--ic-amplitude" = [0.3, 0.5, 0.8]

[ftcs_ref]
"--method" = "ftcs_reference"
"--ref-points" = 400
"--save-every" = 5                    # match CH cadence; without it FTCS stores
                                      # only [0, n_steps] and the reference (the
                                      # L2 baseline) resamples stale every frame
"--ic-amplitude" = [0.3, 0.5, 0.8]

# ---------------------------------------------------------------------
_group_postproc = ["./.venv/bin/python ./q8020-mps-burgers/postproc/plot_method_compare.py --anchor qlbm_circuit --hide shift --no-ic"]
