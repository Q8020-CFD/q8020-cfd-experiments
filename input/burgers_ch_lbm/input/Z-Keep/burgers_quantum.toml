# Burgers 1D Quantum Solver Sweep
#
# This is a max-case TOML - we've since broken out into separate TOMLs for per-case 
# clarity, but this kept for reference.
#
# Run: q8020-sweep q8020-mps-burgers/input/Z-Keep/burgers_quantum.toml
#
# shock_pct=63.0 → T_end ≈ 0.1006 (63% of t_shock = 1/2π ≈ 0.1592)
# n_steps = T_end / (CFL * dx) = T_end * N / CFL   (CFL = Courant-Friedrichs-Lewy number)
#
# NOTE: periodic BC uses endpoint=False → dx=1/N; Dirichlet uses
# endpoint=True → dx=1/(N-1).  At the same q, dt=cfl*dx differs slightly
# between the two, so cross-BC comparisons are at different physical times.
#   q=3 N=8:   n_steps ≈ 8
#   q=4 N=16:  n_steps ≈ 16
#   q=5 N=32:  n_steps ≈ 32
#   q=6 N=64:  n_steps ≈ 64
#   q=7 N=128: n_steps ≈ 128
#   q=8 N=256: n_steps ≈ 256

[global]
_output_dir = "~/q8020"
_inject_outdir = "--outdir"
_env = "./.venv"
_script = "python ./q8020-mps-burgers/src/burgers_solver.py"
"--noshow" = true
"--nu" = 1e-4
"--cfl" = 0.1
"--ic" = "sine"
"--source" = "sine"

# ── Paper-aligned runs (Meena et al. AIAA 2026) ───────
# Matches the paper exactly: Dirichlet BCs, sine IC,
# time-varying source, nu=1e-4, CFL=0.1, 100% shock time.
# These are the "gold standard" runs for q=3..6.

[paper_classical_q3]
"--q" = 3
"--shock-pct" = 100.0
"--method" = "shift"
"--bc" = "dirichlet"
"--save-every" = 2

[paper_classical_q4]
"--q" = 4
"--shock-pct" = 100.0
"--method" = "shift"
"--bc" = "dirichlet"
"--save-every" = 4

[paper_classical_q5]
