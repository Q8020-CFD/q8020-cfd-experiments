# MPS vs. QLBM
# Sine-IC method-comparison sweep (u0 = sin(2*pi*x))

[global]
_output_dir = "~/q8020"
_inject_outdir = "--outdir"
_env = "./.venv"
_script = "python ./q8020-mps-burgers/src/burgers_solver.py"
"--noshow" = true
"--no-classical-reference" = true   # GIF recomputes its own FTCS reference
"--q" = 4                     # qubits = 4, 5, 6
"--nu" = 1e-2                 # viscosity: 1e-2, 1e-3, 1e-4 (smaller nu need more q)
"--cfl" = 0.1                 # time step control, smaller --> more steps
"--shock-pct" = 150.0         # % of shock formation
"--bc" = "periodic"           
"--ic" = "sine"               # u0 = sin(2*pi*x); ic-center/sigma unused
"--ic-amplitude" = 0.4        # scales sin; <1 for LBM stability (1.0 = paper)
"--source" = "none"
"--shots" = 150000
"--auto-cadence" = true       # compute CH segment-size & movie save-every
# Uncapped circuit-metric transpile: analysis sweep, capture full depth/gate
# counts.  cole_hopf_circuit here is LCU -- its SELECT-gate synthesis is the
# crash/slow-prone one, but the metric transpile is isolated in a subprocess,
# so a segfault degrades gracefully and never kills the run.  Set >0 to cap.
"--metric-transpile-timeout" = 0


[qlbm_circuit]
"--method" = "qlbm_circuit"
"--sign-recovery" = "hadamard_test"  # sine goes negative -> sign recovery needed

[cole_hopf_circuit]
"--method" = "cole_hopf_circuit"
"--propagator" = "lcu"               # Taylor block-encoding of the heat propagator
"--lcu-taylor-order" = 4             # Taylor truncation order
"--evolution-mode" = "measure_reprepare"

# Postproc: 2-panel animated GIF (u(x,t) + L2 error vs FTCS)
_group_postproc = ["./.venv/bin/python ./q8020-mps-burgers/postproc/plot_method_compare.py --anchor qlbm_circuit --hide lbm,shift --no-ic"]
