# Well-conditioned comparison: higher nu reduces inverse-transform sensitivity,
# lower CFL reduces FTCS numerical diffusion.  Circuit, MPS, and FTCS should
# nearly overlap — isolates true circuit error clearly.
[cole_hopf_circuit_anim_q5_wellcond]
"--q" = 5
"--nu" = 0.1
"--cfl" = 0.02
"--shock-pct" = 100.0
"--method" = "cole_hopf_circuit"
"--propagator" = "qft-diagonal"
"--bc" = "periodic"
"--source" = "none"
"--shots" = 0
"--save-every" = 1
_group_postproc = ["./q8020-mps-burgers/.venv/bin/python ./q8020-mps-burgers/postproc/plot_cole_hopf_circuit_evolution.py"]

# Multimode IC: 4-mode random-phase Fourier IC produces multiple shocks
# forming, interacting, and merging.  More interesting dynamics than sine.
# nu=0.05 balances visible nonlinearity with stable inverse transform.
[cole_hopf_circuit_anim_multimode_q5]
"--q" = 5
"--nu" = 0.05
"--cfl" = 0.05
"--shock-pct" = 150.0
"--method" = "cole_hopf_circuit"
"--propagator" = "qft-diagonal"
"--bc" = "periodic"
"--source" = "none"
"--ic" = "multimode"
"--ic-modes" = 4
"--ic-seed" = 42
"--ic-alpha" = 1.0
"--shots" = 0
"--save-every" = 1
_group_postproc = ["./q8020-mps-burgers/.venv/bin/python ./q8020-mps-burgers/postproc/plot_cole_hopf_circuit_evolution.py"]

