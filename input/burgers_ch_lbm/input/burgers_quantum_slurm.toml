# Burgers 1D Quantum Solver Sweep
#
# This is a max-case TOML - we've since broken out into separate TOMLs for per-case 
# clarity, but this kept for reference.
#
# Run: q8020-sweep q8020-mps-burgers/input/burgers_quantum.toml
#
# shock_pct=63.0 → T_end ≈ 0.1006 (63% of t_shock = 1/2π ≈ 0.1592)
# n_steps = T_end / (CFL * dx) = T_end * N / CFL   (CFL = Courant-Friedrichs-Lewy number)
#
# NOTE: periodic BC uses endpoint=False → dx=1/N; Dirichlet uses
# endpoint=True → dx=1/(N-1).  At the same q, dt=cfl*dx differs slightly
# between the two, so cross-BC comparisons are at different physical times.
#   q=3 N=8:   n_steps ≈ 8
#   q=4 N=16:  n_steps ≈ 16
#   q=5 N=32:  n_steps ≈ 32
#   q=6 N=64:  n_steps ≈ 64
#   q=7 N=128: n_steps ≈ 128
#   q=8 N=256: n_steps ≈ 256

[global]
_output_dir = "/lustre/orion/ard189/scratch/ishangore/burgers_quantum"
_inject_outdir = "--outdir"
_env = "./q8020-mps-burgers/.venv"
_script = "./q8020-mps-burgers/.venv/bin/python ./q8020-mps-burgers/src/burgers_solver.py"

_slurm = true
_slurm_project = "ard189"
_slurm_pack_venvs = ["./q8020-mps-burgers/.venv"]
_slurm_partition = "extended"
_slurm_walltime = "24:00:00"
_slurm_cores_per_task = 1
_slurm_cores_per_node = 64
_slurm_exclusive_node = false
_run_mode = "parallel"
_trials = 1
_case_timeout = 82800   # 23 hours; leaves 1h margin


"--noshow" = true
"--nu" = 1e-4
"--cfl" = 0.1
"--ic" = "sine"
"--source" = "sine"

# ── Paper-aligned runs (Meena et al. AIAA 2026) ───────
# Matches the paper exactly: Dirichlet BCs, sine IC,
# time-varying source, nu=1e-4, CFL=0.1, 100% shock time.
# These are the "gold standard" runs for q=3..6.

[paper_classical_q3]
"--q" = 3
"--shock-pct" = 100.0
"--method" = "shift"
"--bc" = "dirichlet"
"--save-every" = 2

[paper_classical_q4]
"--q" = 4
"--shock-pct" = 100.0
"--method" = "shift"
"--bc" = "dirichlet"
"--save-every" = 4

[paper_classical_q5]
"--q" = 5
"--shock-pct" = 100.0
"--method" = "shift"
"--bc" = "dirichlet"
"--save-every" = 8

# ── F10 Cole-Hopf circuit (quantum propagator, statevector) ───────────────
# QFT-diagonal propagator (default): periodic BC, nu=1e-2, statevector.
# Matches cole_hopf_q* params for direct comparison.

[cole_hopf_circuit_qft_q3]
"--q" = 3
"--nu" = 1e-2
"--shock-pct" = 100.0
"--method" = "cole_hopf_circuit"
"--propagator" = "qft-diagonal"
"--bc" = "periodic"
"--source" = "none"
"--save-every" = 2

[cole_hopf_circuit_qft_q4]
"--q" = 4
"--nu" = 1e-2
"--shock-pct" = 100.0
"--method" = "cole_hopf_circuit"
"--propagator" = "qft-diagonal"
"--bc" = "periodic"
"--source" = "none"
"--save-every" = 4

[cole_hopf_circuit_qft_q5]
"--q" = 5
"--nu" = 1e-2
"--shock-pct" = 100.0
"--method" = "cole_hopf_circuit"
"--propagator" = "qft-diagonal"
