# =====================================================================
# CH HARDWARE RUNNER : smooth case (F12)
# ---------------------------------------------------------------------
# Drives burgers_ch_hw_runner.py — the Cole-Hopf measure-reprepare
# segment loop on a simulator / local SamplerV2 proxy / real IBM
# hardware.  Physics mirrors q8020_burgers_ab_show_q4_ch_smooth.toml
# (q=4, nu=0.08, A=0.3, n_steps=30, segment_size=5 -> 6 serial QPU
# invocations).
#
# Run order (credential-free first):
#   1. --target sim   --dry-run        : free transpile, ideal basis
#   2. --target local                  : SamplerV2 + Session + noisy
#                                         FakeBackend proxy, no creds
#   3. --target hardware --backend-name ibm_boston --dry-run
#                                       : true heavy-hex CX/depth
#   4. --target hardware --backend-name ibm_boston
#                                       : the real 6-segment run
# Flip --target on the command line; this TOML sets the case + shots.
# =====================================================================

[global]
_output_dir = "~/q8020"
_inject_outdir = "--outdir"
_env = "./.venv"
_script = "python ./q8020-mps-burgers/src/burgers_ch_hw_runner.py"

"--case" = "smooth"
"--target" = "sim"
"--shots" = 150000
"--seed" = 1234

# Render the evolution movie after the run.  The runner writes the quantum
# (cole_hopf_circuit) and ftcs_reference series as two case dirs under
# <case_dir>/method_compare; plot_method_compare.py reads case_dir from the
# postproc JSON the sweeper appends as the final arg.
_case_postproc = [
  "./.venv/bin/python ./q8020-mps-burgers/postproc/plot_method_compare.py --reference ftcs_reference"
]

[run]
# Single case group; the sweeper injects --outdir and runs the script.
