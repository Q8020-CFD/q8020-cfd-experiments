# =====================================================================
# CH HARDWARE RUNNER : single-circuit "stunt" demo (q3)
# ---------------------------------------------------------------------
# Drives burgers_ch_hw_runner.py with the `smooth_stunt` case: q=3,
# nu=0.08, A=0.3, folded into ONE exact time-step (cfl=3.0 -> dt = full
# time T).  The qft-diagonal propagator's damping is the closed-form heat
# solution, so one big step == the 30-step march with zero Trotter error
# (verified: analytic 2.8e-16; sim fold-vs-multi ~0.04; sim rel-L2 0.065).
#
# One segment => ONE QPU circuit, one post-selection (p_success ~0.97),
# no measure-reprepare rounds.  On ibm_kingston: depth ~295, 97 2q gates,
# 5 qubits -> well inside coherence, unlike the q4 6-segment run
# (depth 4633, rel-L2 1.71).  See [[q8020-segment-size-tradeoff]].
#
# Run order (credential-free first):
#   1. sim dry-run : q8020-sweep <this> --set target=sim --dry-run
#   2. hw  dry-run : q8020-sweep <this> --set target=hardware --dry-run
#   3. the real run: q8020-sweep <this>          (target=hardware below)
# =====================================================================

[global]
_output_dir = "~/q8020"
_inject_outdir = "--outdir"
_env = "./.venv"
_script = "python ./q8020-mps-burgers/src/burgers_ch_hw_runner.py"

"--case" = "smooth_stunt"
"--target" = "hardware"
"--backend-name" = "ibm_kingston"
"--no-session" = true
"--shots" = 150000
"--seed" = 1234
# Pin the layout to a hand-picked good-calibration 5-qubit chain on
# ibm_kingston (cz ~1.3e-3, readout ~7e-3).  Kingston's Target reports
# error=None, which blinds the transpiler's error-aware layout pass -- the
# unpinned run (1.34) landed on bad qubits while the noise model (which DOES
# see errors) predicted ~0.16.  Re-derive with /tmp/best_layout.py if the
# device recalibrates and these qubits degrade.
"--initial-layout" = "82,81,80,83,96"

# Render the evolution movie after the run (quantum vs ftcs_reference).
_case_postproc = [
  "./.venv/bin/python ./q8020-mps-burgers/postproc/plot_method_compare.py --reference ftcs_reference"
]

[run]
# Single case group; the sweeper injects --outdir and runs the script.
