# Smoke: fast cartoon 

[global]
_output_dir = "~/q8020"
_inject_outdir = "--outdir"
_env = "./.venv"
_script = "python ./q8020-mps-burgers/src/burgers_solver.py"
"--noshow" = true               
"--q" = 4                       
"--nu" = 0.1                    
"--cfl" = 0.1                  
"--n-steps" = 30     # -->3 QLBM steps = 1 IC + 3 = 4 frames of a post-proc movie
"--bc" = "periodic"
"--ic" = "sine"
"--ic-amplitude" = 0.3          
"--source" = "none"
"--shots" = 2000
"--seed" = 1234
"--no-classical-reference" = true
"--no-analytic-reference" = true
"--save-every" = 5
"--segment-size" = 5 
"--metric-transpile-timeout" = 0
"--ref-points" = 200         
"--evolution-mode" = "measure_reprepare"


[cole_hopf_circuit]
"--method" = "cole_hopf_circuit"
"--propagator" = "qft-diagonal"      # shallowest, fast at small q
"--bond-dim" = 4
"--phi-modes" = 6                    # match test: exercise CH Fourier low-pass

[qlbm_circuit]
"--method" = "qlbm_circuit"
"--fock-qubits" = 3                  # match test (qc=2 too coarse); cheap at q=4
"--qalb-collision-trotter-reps" = 0  # match test: dense exact collision path

# classical D1Q3 LBM: shares QLBM's scheme, so QLBM-vs-lbm isolates the
# quantum/Fock error and lbm-vs-FTCS isolates the scheme gap.
[lbm_classical]
"--method" = "lbm"

[ftcs_ref]
"--method" = "ftcs_reference"

_group_postproc = ["./.venv/bin/python ./q8020-mps-burgers/postproc/plot_method_compare.py --anchor qlbm_circuit --hide shift --no-ic"]
