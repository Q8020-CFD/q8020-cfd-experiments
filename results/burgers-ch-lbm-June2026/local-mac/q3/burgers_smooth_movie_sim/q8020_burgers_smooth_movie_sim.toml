# =====================================================================
# SMOOTH_MOVIE : SIM match for the real-qc hardware runs
# ---------------------------------------------------------------------
# Statevector-sim counterpart to the "smooth_movie" case that was run on
# four IBM backends (ibm_fez, ibm_kingston, ibm_boston, ibm_miami) under
# experiments/results/mps-burgers/real-qc/hardware_runs.
#
# Physics copied verbatim from those runs' q8020_case_0.json:
#   q=3, nu=0.08, ic_amplitude=0.3, cfl=0.3, n_steps=6,
#   segment_size=1, save_every=1, periodic, qft-diagonal,
#   bond_dim=8, phi_modes=8.
#
# The hardware loop ran cole_hopf in measure_reprepare; this file does
# the same on the noiseless simulator so the sim and the per-backend
# hardware movies are directly comparable (CH vs the FTCS reference).
#
# Shots is swept: 150000 (the hardware shot budget -> sampling noise)
# and 0 (idealized statevector, no sampling).  List-valued params expand
# only inside a [group] and [global] merges on top, so --shots lives in
# the cole_hopf_circuit block, NOT [global] (which would override it).
# =====================================================================

[global]
_output_dir = "~/q8020"
_inject_outdir = "--outdir"
_env = "./.venv"
_script = "python ./q8020-mps-burgers/src/burgers_solver.py"
"--noshow" = true

"--nu" = 0.08
"--cfl" = 0.3
"--n-steps" = 6
"--ic" = "sine"
"--ic-amplitude" = 0.3
"--bc" = "periodic"
"--source" = "none"
"--evolution-mode" = "measure_reprepare"

"--seed" = 1234
"--metric-transpile-timeout" = 0

"--q" = 3

# ---------------------------------------------------------------------
[cole_hopf_circuit]
"--method" = "cole_hopf_circuit"
"--propagator" = "qft-diagonal"
"--segment-size" = 1
"--save-every" = 1
"--bond-dim" = 8
"--phi-modes" = 8
# 150000 = hardware shot budget (sampling noise); 0 = idealized statevector
"--shots" = [150000, 0]

[ftcs_ref]
"--method" = "ftcs_reference"
"--ref-points" = 800
"--save-every" = 1

# ---------------------------------------------------------------------
_group_postproc = ["./.venv/bin/python ./q8020-mps-burgers/postproc/plot_method_compare.py --reference ftcs_reference --no-ic"]
