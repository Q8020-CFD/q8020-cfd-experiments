# FVM Euler 1D Solver - Frontier embarrassingly parallel sweep
#
# Designed for OLCF Frontier: packs many independent cases across nodes.
# Each FVM solve is single-core (~5s), so 64 cases fit on 1 node.
# List-valued parameters are auto-expanded into cross-product combinations.
#
# Usage:
#   q8020-sweep fvm_1d_smoke_frontier_test.toml
#   q8020-sweep fvm_1d_smoke_frontier_test.toml --dry-run

[global]
_slurm = true
_run_mode = "parallel"
_slurm_submit = true
_slurm_project = "ard189"
_slurm_partition = "batch"
_slurm_walltime = "02:00:00"
_cores_per_task = 1
_output_dir = "~/base_test_env_fix"

# Optional: broadcast packed conda env to NVMe burst buffer for fast imports
# Create with: conda-pack -o packed_env.tar.gz
# _slurm_conda_archive = "/path/to/packed_env.tar.gz"

_env = "~/q8020/fvm_euler_1d_solver/.venv"
_script = """\
source ~/q8020/fvm_euler_1d_solver/.venv/bin/activate && 
python3 ~/q8020/fvm_euler_1d_solver/nozzle_1d_solver.py\
"""
_case_postproc = [
    "source ~/venvs/q8020-sweep/bin/activate && python3 ~/q8020/q8020-cfd-experiments/codes/fvm_euler_1d_nozzle/fvm_euler_1d_solver_harvester.py"
]
_inject_outdir = "-outdir"
"-time_scheme" = "BDF1"
"-cfl" = "1e5"
"-localdt" = true
"-noshow" = true

# ---------------------------------------------------------------------------
# Small test case for test validity 
# ---------------------------------------------------------------------------
[ideal]
"-nelem" = 5
"-shots" = 150000
