# HHL Scaling Sweep: Modular vs Original at increasing problem sizes
# Run with: q8020-sweep input/hhl_scaling.toml
#
# Exact power-of-2 tridiag (2,-1,-1) with natural kappa scaling:
#   N=2:  kappa=3,     clock=3,  total=5  qubits
#   N=4:  kappa=9.5,   clock=5,  total=8  qubits
#   N=8:  kappa=32,    clock=7,  total=11 qubits
#   N=32: kappa=441,   clock=10, total=16 qubits
#   N=64: kappa=1712,  clock=12, total=19 qubits
# N=16 omitted: pathological QPE phase alignment at kappa=117.
# Clock qubits auto-computed from condition number.
# Depth=1: top-level blocks (state_prep, qpe, rotations, inv_qpe, meas)
# Depth=2: QPE/inv_QPE further split into controlled-U stages + QFT

[global]
_output_dir = "~/q8020"
_inject_outdir = "--outdir"
_env = "./.venv"
"--shots" = 65536
"--optimization-level" = 0
"--seed" = 42
"--tridiag" = true
_final_postproc = [
    "./.venv/bin/python ./q8020-cfd-axequalsb/src/hhl_compare_postproc.py",
]

# ── 2x2 (kappa=3, 5 qubits) ────────────────────────────────────
[size_2_orig]
_script = "python ./q8020-cfd-axequalsb/src/ax_equals_b_hhl.py"
"--size" = 2
"--metrics-only" = true

[size_2_d1]
_script = "python ./q8020-cfd-axequalsb/src/ax_equals_b_modular_hhl.py"
"--size" = 2
"--decomposition-depth" = 1
"--seam-optimize" = true

[size_2_d2]
_script = "python ./q8020-cfd-axequalsb/src/ax_equals_b_modular_hhl.py"
"--size" = 2
"--decomposition-depth" = 2
"--seam-optimize" = true

# ── 4x4 (kappa=9.5, 8 qubits) ──────────────────────────────────
