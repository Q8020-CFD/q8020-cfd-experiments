# CKS Algorithm with Qrisp Sweep
# Run with: q8020-sweep input/ax_equals_b_cks_qrisp_est.toml
#
# Note: CKS uses Qrisp's terminal_sampling which returns exact probabilities.
# No --shots, --backend, --t1, --t2 args are supported.

[global]
_output_dir = "~/q8020"
_inject_outdir = "--outdir"
_env = "./.venv"
_script = "python src/ax_equals_b_cks_qrisp_est.py"
"--epsilon" = 0.01

# Simple 2x2 system
[simple_2x2]
"--matrix" = "[[3,1],[1,3]]"
"--vector" = "[1,1]"

# Diagonal dominant system
[diagonal_2x2]
"--matrix" = "[[4,1],[1,4]]"
"--vector" = "[1,0]"

# Different vector
[simple_2x2_alt]
"--matrix" = "[[2,1],[1,2]]"
"--vector" = "[1,0]"

# Epsilon study (the key tunable parameter for CKS)
[epsilon_study]
"--matrix" = "[[3,1],[1,3]]"
"--vector" = "[1,1]"
"--epsilon" = [0.1, 0.01, 0.001]

# 4x4 system
[system_4x4]
"--matrix" = "[[4,1,0,0],[1,4,1,0],[0,1,4,1],[0,0,1,4]]"
"--vector" = "[1,0,0,0]"
