# Smoke test: local parallel sweep via _run_mode = "parallel"
# Run from the q8020-cfd root:
#   q8020-sweep q8020-cfd-experiments/cases/_smoke_tests/local_parallel.toml

[global]
_output_dir = "~/q8020"
_run_mode = "parallel"
_inject_outdir = "-outdir"
_env = "./fvm_euler_1d_solver/.venv"
_script = "python ./fvm_euler_1d_solver/nozzle_1d_solver.py"
_case_postproc = [
    "python q8020-cfd-experiments/codes/fvm_euler_1d_nozzle/fvm_euler_1d_solver_harvester.py",
    "python q8020-cfd-experiments/codes/fvm_euler_1d_nozzle/backend_meta_harvester.py"
]
"-nelem" = 2
"-linsolver" = "HHL"
"-localdt" = true
"-noshow" = true
"-iters" = 1
"-initers" = 1

[ideal]

[shots_1024]
"-shots" = 1024

[fake_melbourne]
"-backend" = "fake fake_melbourne"
"-shots" = 1
